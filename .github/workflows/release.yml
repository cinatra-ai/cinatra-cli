name: release

# Tag-time RELEASE VALIDATOR for the `@cinatra-ai/cinatra` CLI.
#
# Publishing is performed LOCALLY (a maintainer runs `npm publish --access public`
# authenticated with the Infisical-held `/npm` token) — NOT in CI. So this
# workflow does NOT publish; it exists only to FAIL LOUDLY if a `v*` tag is pushed
# whose name does not equal the manifest version. The full install/test/pack
# contract runs in ci.yml on every PR and on main; duplicating it here (as a
# second mutable install/test gate) would add no signal once CI is not publishing.
#
# Trigger: pushing a tag `v<package.json .version>` (e.g. v0.1.2). The job passes
# only when the tag matches the manifest version.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Verify the pushed tag matches the manifest version
        run: |
          version="$(node -e 'console.log(require("./package.json").version)')"
          ref="${GITHUB_REF#refs/tags/}"
          echo "Manifest version: $version"
          echo "Tag ref:          $ref"
          if [ "$ref" != "v$version" ]; then
            echo "::error::Tag ($ref) must equal v<package.json.version> (v$version)."
            exit 1
          fi
          echo "Tag matches @cinatra-ai/cinatra@$version."
          echo "Publishing is performed locally via the Infisical /npm token, not in CI."
