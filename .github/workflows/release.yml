name: release

# Tag-time OIDC PUBLISHER for the `@cinatra-ai/cinatra` CLI.
#
# Publishing uses npm Trusted Publishing (OIDC): there is NO npm token in this
# path. A Trusted Publisher is configured on npmjs.com for this package
# (@cinatra-ai/cinatra) binding it to GitHub Actions in org cinatra-ai, repo
# cinatra-cli, workflow release.yml. When this workflow runs `npm publish`, the
# OIDC token minted via `id-token: write` is presented to the registry and npm
# authorizes the publish tokenlessly. Provenance/attestation is generated
# automatically (no --provenance flag needed under trusted publishing).
#
# Requirements (npm docs, trusted-publishers): npm CLI >= 11.5.1 and Node >=
# 22.14.0. Node 24 satisfies the Node floor; `npm install -g npm@latest` lifts
# the bundled npm above the 11.5.1 floor.
#
# Trigger: pushing a tag `v<package.json .version>` (e.g. v0.1.2). The job
# asserts the tag matches the manifest version, then publishes.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # RELEASE-APPROVAL WALL (cinatra-engineering release-approval doctrine):
    # this job PUBLISHES @cinatra-ai/cinatra to PUBLIC npm via OIDC trusted
    # publishing on a `v*` tag push. This is the exact path whose unapproved
    # auto-publish triggered the hardening. The protected `release-approval`
    # Environment (required reviewer + prevent_self_review + can_admins_bypass=
    # false) PAUSES this job until a human approves it, so a `v*` tag can never
    # auto-publish to npm again without an explicit approval click. The
    # Environment is provisioned in this repo via the GitHub API; if it is ever
    # deleted GitHub auto-recreates it WITHOUT rules (unblocked), so do not delete
    # it — and NEVER remove this `environment:` line — without explicit owner
    # approval. It is the technical backstop for the no-autonomous-publish rule.
    environment: release-approval
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No git auth is used after checkout (no push/fetch/submodule); the
          # publish authenticates via OIDC, not the GITHUB_TOKEN. Don't leave
          # the token in local git config.
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm meets the OIDC trusted-publishing floor (>= 11.5.1)
        run: |
          npm install -g npm@latest
          echo "npm $(npm --version) / node $(node --version)"

      - name: Assert the pushed tag matches the manifest version
        run: |
          version="$(node -p 'require("./package.json").version')"
          tag="${GITHUB_REF_NAME#v}"
          echo "Manifest version: $version"
          echo "Tag (stripped):   $tag"
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag (${GITHUB_REF_NAME}) must equal v<package.json.version> (v$version)."
            exit 1
          fi
          echo "Tag matches @cinatra-ai/cinatra@$version — publishing via OIDC."

      - name: Publish to npm via OIDC trusted publishing (tokenless)
        run: npm publish --access public
