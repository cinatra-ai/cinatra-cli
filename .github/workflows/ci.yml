name: ci

# CI for the standalone `cinatra` CLI (a true dependency-light npm package — NOT
# a marketplace extension and NOT a source mirror). It ships ZERO @cinatra-ai/*
# dependencies (they are resolved from the operator's checkout at runtime), so it
# installs, tests, packs, and runs fully standalone in CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Assert zero @cinatra-ai/* dependencies declared
        # Fast fail BEFORE install if any first-party package leaked into the
        # manifest — the thin CLI must carry none (they are checkout-resolved).
        # The vitest contract (tests/zero-checkout-imports.test.mjs) re-verifies
        # this plus the absence of any @cinatra-ai/* import in the sources.
        run: |
          node -e '
            const p = require("./package.json");
            const fp = (o) => Object.keys(o || {}).filter((k) => k.startsWith("@cinatra-ai/") || k.startsWith("@cinatra/"));
            const leaked = [
              ...fp(p.dependencies), ...fp(p.devDependencies),
              ...fp(p.peerDependencies), ...fp(p.optionalDependencies),
            ];
            if (leaked.length) {
              console.error("Thin CLI must declare NO first-party deps; found: " + leaked.join(", "));
              process.exit(1);
            }
            console.log("OK: zero @cinatra-ai/* dependencies declared.");
          '

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Assert zero @cinatra-ai/* in the resolved dependency tree
        # Belt-and-braces: prove nothing pulled a first-party package transitively.
        # Match only INSTALLED packages (paths under node_modules/@cinatra-ai/),
        # never the root package's own self-line — the CLI is itself published as
        # @cinatra-ai/cinatra, so its own name legitimately appears as the tree root.
        run: |
          installed="$(npm ls --all --parseable 2>/dev/null | grep "/node_modules/@cinatra-ai/" || true)"
          if [ -n "$installed" ]; then
            echo "::error::@cinatra-ai/* present in the resolved dependency tree."
            echo "$installed"
            exit 1
          fi
          echo "OK: no @cinatra-ai/* dependency in the resolved tree."

      - name: Lint SKILL.md frontmatter (reject validator violations — cinatra-cli#45)
        # Scans every SOURCE SKILL.md and fails on any frontmatter the standard
        # skills validator rejects (cinatra superset: standard rules + the
        # metadata.* project-key convention). Excludes templates/ (un-rendered
        # scaffolds, linted via their rendered output by the test suite) and
        # tests/fixtures/ (intentional good/bad cases). Zero deps — runs before
        # the full test pass so a frontmatter break fails fast with a clear error.
        run: npm run lint:skills

      - name: Test (vitest run — includes the zero-checkout-imports contract)
        run: npm test

      - name: Smoke — cinatra --help loads and exits 0
        run: node bin/cinatra.mjs --help

      - name: Smoke — cinatra --version prints the package version
        run: |
          want="$(node -e 'console.log(require("./package.json").version)')"
          got="$(node bin/cinatra.mjs --version)"
          test "$want" = "$got" || { echo "--version mismatch: want $want got $got"; exit 1; }
          echo "OK: cinatra --version = $got"

      - name: Pack (dry run) — validate publish payload shape
        run: npm pack --dry-run
