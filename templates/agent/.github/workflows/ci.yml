name: ci

# Standalone CI for a Cinatra extension repo.
#
# Baseline gate (build job) applies to every kind. The kind-gates job runs the
# self-contained, zero-dependency `extension-kind-gate.mjs` shipped in this repo
# (plain `node`, no @cinatra-ai dependency) so CI passes even before the
# @cinatra-ai registry is reachable. For this AGENT kind it validates
# cinatra/oas.json.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Enable corepack
        run: corepack enable

      - name: Classify repo + validate first-party dep shape
        # First-party @cinatra-ai/* packages (sdk-extensions, sdk-ui, ...) are
        # declared as OPTIONAL peerDependencies. FAIL (exit 2) if any first-party
        # package leaked into dependencies/devDependencies/optionalDependencies,
        # or if a first-party peer is missing peerDependenciesMeta.optional.
        # A repo that declares such optional peers is treated as a source mirror
        # (the host workspace provides/builds/typechecks/tests these), so the
        # standalone install/typecheck/test below are skipped. A truly standalone
        # repo (0 first-party deps) gets the full install + typecheck + test.
        run: |
          code=0
          node -e '
            const p = require("./package.json");
            const fp = (o) => Object.keys(o || {}).filter((k) => k.startsWith("@cinatra-ai/") || k.startsWith("@cinatra/"));
            const leaked = [...fp(p.dependencies), ...fp(p.devDependencies), ...fp(p.optionalDependencies)];
            if (leaked.length) { console.error("First-party packages must be OPTIONAL peerDependencies, not deps/devDeps: " + leaked.join(", ")); process.exit(2); }
            const peers = fp(p.peerDependencies);
            const meta = p.peerDependenciesMeta || {};
            const notOptional = peers.filter((k) => !(meta[k] && meta[k].optional === true));
            if (notOptional.length) { console.error("First-party peer(s) must be marked peerDependenciesMeta.optional: " + notOptional.join(", ")); process.exit(2); }
            process.exit(peers.length ? 0 : 1);
          ' || code=$?
          if [ "$code" -eq 2 ]; then
            echo "::error::First-party @cinatra-ai/* dependency-shape regression (see above)."
            exit 1
          elif [ "$code" -eq 0 ]; then
            echo "first_party=1" >> "$GITHUB_ENV"
            echo "Declares host-internal @cinatra-ai/* optional peers — the host workspace provides/builds/typechecks/tests these. Skipping standalone install + typecheck + test."
          else
            echo "first_party=0" >> "$GITHUB_ENV"
            echo "Standalone repo: no host-internal @cinatra-ai/* peers — running full install + typecheck + test."
          fi

      - name: Install dependencies
        run: |
          if [ "$first_party" = "1" ]; then
            echo "Skipping standalone install (host-internal @cinatra-ai/* peers are resolved by the host workspace)."
            exit 0
          fi
          corepack pnpm install --no-frozen-lockfile

      - name: Typecheck
        # Typecheck the repo's OWN TypeScript sources. Content-only extensions
        # that ship no tracked TS are skipped (tsc would error TS18003).
        run: |
          if [ "$first_party" = "1" ]; then
            echo "Skipping standalone typecheck (host-internal @cinatra-ai/* peers are typechecked by the host workspace)."
            exit 0
          elif node -e "process.exit(((require('./package.json').scripts)||{}).typecheck?0:1)"; then
            corepack pnpm run typecheck
          elif [ -z "$(git ls-files '*.ts' '*.tsx' '*.mts' '*.cts')" ]; then
            echo "No TypeScript sources tracked — nothing to typecheck (content-only extension)."
            exit 0
          elif node -e "p=require('./package.json');d={...p.dependencies,...p.devDependencies};process.exit(d.typescript?0:1)"; then
            corepack pnpm exec tsc --noEmit
          else
            npx -y -p typescript tsc --noEmit
          fi

      - name: Test
        run: |
          if [ "$first_party" = "1" ]; then
            echo "Skipping standalone tests (host-internal @cinatra-ai/* peers are tested by the host workspace)."
            exit 0
          fi
          corepack pnpm test --if-present

      - name: Pack (dry run)
        # Validates package shape + publish payload without resolving peers.
        run: npm pack --dry-run

  kind-gates:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
      - name: Agent OAS validation gate
        # Validate this repo's cinatra/oas.json agent surface via the
        # self-contained, zero-dependency gate shipped in this repo.
        run: node extension-kind-gate.mjs --package-root .
